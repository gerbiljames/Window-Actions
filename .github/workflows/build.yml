name: Build Windows Plugin

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Build plugin
        run: >
          uv run
          --python 3.12
          --with-requirements requirements.txt
          --no-project
          python buildFiles/build.py

      - name: Upload .streamDeckPlugin
        uses: actions/upload-artifact@v4
        with:
          name: com.arkyasmal.windowactions.streamDeckPlugin
          path: Release/com.arkyasmal.windowactions.streamDeckPlugin
          if-no-files-found: error

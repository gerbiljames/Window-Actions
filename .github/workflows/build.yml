name: Build Windows Plugin

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: requirements.txt

      - name: Build plugin
        run: >
          uv run
          --python 3.12
          --with-requirements requirements.txt
          --no-project
          python buildFiles/build.py

      - name: Upload .streamDeckPlugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: com.arkyasmal.windowactions.streamDeckPlugin
          path: Release/com.arkyasmal.windowactions.streamDeckPlugin
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: Release/com.arkyasmal.windowactions.streamDeckPlugin

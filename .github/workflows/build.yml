name: Build Windows Plugin

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show py launcher version
        run: py -3 --version

      - name: Install dependencies
        run: |
          py -3 -m pip install --upgrade pip
          py -3 -m pip install -r requirements.txt

      - name: Build plugin
        run: py -3 buildFiles/build.py

      - name: Upload .streamDeckPlugin
        uses: actions/upload-artifact@v4
        with:
          name: com.arkyasmal.windowactions.streamDeckPlugin
          path: Release/com.arkyasmal.windowactions.streamDeckPlugin
          if-no-files-found: error
